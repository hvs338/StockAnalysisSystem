# The watchlist the digest evaluates each day.
#
# Schwab did NOT carry watchlists over from the TD Ameritrade API, so there is no
# Schwab endpoint to pull them from (the old /watchlists path returns 404). This
# file IS the watchlist — edit it to mirror whatever you track in the Schwab app.
#
# YAML note: each entry MUST be "- SYMBOL" (dash, then a space). "-SYMBOL" without
# the space is NOT a list item and silently breaks parsing.
